<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Support ZeroBudget Films</title>

  <style>

    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    body {
      background: #000;
      color: white;
      font-family: -apple-system, BlinkMacSystemFont, sans-serif;
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 30px;
      overflow: hidden;
    }

    .bg-glow {
      position: absolute;
      width: 500px;
      height: 500px;
      background: radial-gradient(circle, rgba(255,60,0,0.18), transparent 70%);
      filter: blur(50px);
      z-index: 0;
    }

    .card {
      position: relative;
      z-index: 1;
      width: 100%;
      max-width: 420px;
      background: rgba(255,255,255,0.04);
      border: 1px solid rgba(255,255,255,0.08);
      border-radius: 28px;
      padding: 40px 28px;
      backdrop-filter: blur(20px);
      text-align: center;
      box-shadow: 0 0 40px rgba(0,0,0,0.4);
    }

    .logo {
      width: 220px;
      margin-bottom: 30px;
    }

    .headline {
      font-size: 26px;
      font-weight: 700;
      margin-bottom: 14px;
      letter-spacing: -0.5px;
    }

    .subtext {
      color: #bdbdbd;
      font-size: 15px;
      line-height: 1.7;
      margin-bottom: 28px;
    }

    .upi-box {
      background: rgba(255,255,255,0.06);
      border: 1px solid rgba(255,255,255,0.08);
      padding: 18px;
      border-radius: 18px;
      margin-bottom: 18px;
    }

    .upi-label {
      color: #999;
      font-size: 13px;
      margin-bottom: 8px;
      text-transform: uppercase;
      letter-spacing: 1px;
    }

    .upi-id {
      font-size: 20px;
      font-weight: 700;
      color: #ff5a1f;
      word-break: break-word;
    }

    .note {
      color: #cfcfcf;
      font-size: 14px;
      line-height: 1.6;
      margin-bottom: 28px;
    }

    .button {
      display: inline-block;
      width: 100%;
      padding: 16px;
      border-radius: 16px;
      background: linear-gradient(135deg, #ff5a1f, #ff2f00);
      color: white;
      text-decoration: none;
      font-size: 16px;
      font-weight: 700;
      transition: transform 0.2s ease;
      box-shadow: 0 10px 30px rgba(255,80,20,0.25);
    }

    .button:active {
      transform: scale(0.98);
    }

    .footer {
      margin-top: 24px;
      font-size: 12px;
      color: #777;
      line-height: 1.6;
    }

  </style>
</head>

<body>

  <div class="bg-glow"></div>

  <div class="card">

    <img src="logo.png" alt="ZeroBudget Films" class="logo">

    <div class="headline">
      Thank You!
    </div>

    <div class="subtext">
      Your contribution helps us make more films and pay artists and technicians fairly.
    </div>

    <div class="upi-box">
      <div class="upi-label">UPI ID</div>
      <div class="upi-id">arvin.vaz@federal</div>
    </div>

    <div class="note">
      <strong>UPI ID copied successfully.</strong><br>
      Tap below to open your preferred UPI app and paste the ID to pay.
    </div>

    <a class="button" href="upi://pay">
      Open Any UPI App
    </a>

    <div class="footer">
      Thank you for supporting ZeroBudget Films.
    </div>

  </div>

  <script>
    navigator.clipboard.writeText("arvin.vaz@federal");
  </script>

</body>
</html>
