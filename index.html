<!DOCTYPE html>
<html>
<head>
  <title>Support ZeroBudget Films</title>
  <meta name="viewport" content="width=device-width, initial-scale=1">
</head>

<body style="
  font-family: sans-serif;
  background: #111;
  color: white;
  text-align: center;
  padding: 40px;
">

  <h1>Support ZeroBudget Films</h1>

  <p>
    Your contribution helps us make more films and pay artists and technicians fairly.
  </p>

  <p>
    UPI ID:<br>
    <strong id="upi">arvin.vaz@federal</strong>
  </p>

  <button onclick="copyUPI()" style="
    padding: 15px 25px;
    border: none;
    border-radius: 10px;
    margin-top: 10px;
    cursor: pointer;
    font-size: 16px;
  ">
    Copy UPI ID
  </button>

  <p id="copied" style="margin-top:10px;"></p>

  <div style="
    margin-top:30px;
    display:flex;
    flex-direction:column;
    gap:15px;
    max-width:300px;
    margin-left:auto;
    margin-right:auto;
  ">

    <a href="upi://pay?pa=arvin.vaz@federal&pn=Arvin%20Vaz"
       style="padding:15px;background:white;color:black;text-decoration:none;border-radius:10px;">
      Open Any UPI App
    </a>

    <a href="gpay://upi/pay?pa=arvin.vaz@federal&pn=Arvin%20Vaz"
       style="padding:15px;background:white;color:black;text-decoration:none;border-radius:10px;">
      Google Pay
    </a>

    <a href="phonepe://pay?pa=arvin.vaz@federal&pn=Arvin%20Vaz"
       style="padding:15px;background:white;color:black;text-decoration:none;border-radius:10px;">
      PhonePe
    </a>

  </div>

  <script>
    function copyUPI() {
      navigator.clipboard.writeText("arvin.vaz@federal");
      document.getElementById("copied").innerText = "UPI ID copied!";
    }
  </script>

</body>
</html>
