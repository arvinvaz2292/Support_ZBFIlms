<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Support ZeroBudget Films</title>

  <style>

    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    body {
      background: #000;
      color: white;
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 30px;
      overflow: hidden;
    }

    .bg-glow {
      position: absolute;
      width: 500px;
      height: 500px;
      background: radial-gradient(circle, rgba(255,60,0,0.15), transparent 70%);
      filter: blur(60px);
      z-index: 0;
    }

    .card {
      position: relative;
      z-index: 1;
      width: 100%;
      max-width: 430px;
      background: rgba(255,255,255,0.04);
      border: 1px solid rgba(255,255,255,0.08);
      border-radius: 30px;
      padding: 42px 28px;
      backdrop-filter: blur(20px);
      text-align: center;
      box-shadow: 0 0 50px rgba(0,0,0,0.45);
    }

    .brand {
      font-size: 42px;
      font-weight: 700;
      letter-spacing: -2px;
      margin-bottom: 34px;
      line-height: 1;
      text-shadow: 0 2px 10px rgba(0,0,0,0.5);
    }

    .white {
      color: #f2f2f2;
    }

    .orange {
      color: #ff3b0a;
    }

    .headline {
      font-size: 28px;
      font-weight: 700;
      margin-bottom: 14px;
      letter-spacing: -0.6px;
    }

    .subtext {
      color: #b8b8b8;
      font-size: 15px;
      line-height: 1.7;
      margin-bottom: 30px;
    }

    .upi-box {
      background: rgba(255,255,255,0.05);
      border: 1px solid rgba(255,255,255,0.08);
      padding: 20px;
      border-radius: 20px;
      margin-bottom: 20px;
    }

    .upi-label {
      color: #8e8e8e;
      font-size: 12px;
      margin-bottom: 10px;
      text-transform: uppercase;
      letter-spacing: 1.5px;
    }

    .upi-id {
      font-size: 22px;
      font-weight: 700;
      color: #ff3b0a;
      word-break: break-word;
      letter-spacing: -0.5px;
    }

    .note {
      color: #cfcfcf;
      font-size: 14px;
      line-height: 1.7;
      margin-bottom: 30px;
    }

    .button {
      display: inline-block;
      width: 100%;
      padding: 18px;
      border-radius: 18px;
      background: linear-gradient(135deg, #ff5a1f, #ff2f00);
      color: white;
      text-decoration: none;
      font-size: 17px;
      font-weight: 700;
      transition: transform 0.2s ease;
      box-shadow: 0 12px 35px rgba(255,70,20,0.28);
    }

    .button:active {
      transform: scale(0.98);
    }

    .footer {
      margin-top: 28px;
      font-size: 12px;
      color: #777;
      line-height: 1.6;
    }

  </style>
</head>

<body>

  <div class="bg-glow"></div>

  <div class="card">

    <div class="brand">
      <span class="white">Z</span><span class="orange">eroBudget</span><span class="white"> Films</span>
    </div>

    <div class="headline">
      Thank You!
    </div>

    <div class="subtext">
      Your contribution helps us make more films and pay artists and technicians fairly.
    </div>

    <div class="upi-box">
      <div class="upi-label">UPI ID</div>
      <div class="upi-id">arvin.vaz@federal</div>
    </div>

    <div class="note">
      <strong>UPI ID copied successfully.</strong><br>
      Tap below to open your preferred UPI app and paste the ID to pay.
    </div>

    <a class="button" href="upi://pay">
      Open Any UPI App
    </a>

    <div class="footer">
      Thank you for supporting independent cinema.
    </div>

  </div>

  <script>
    navigator.clipboard.writeText("arvin.vaz@federal");
  </script>

</body>
</html>
