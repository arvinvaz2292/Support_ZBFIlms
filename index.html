<!DOCTYPE html>
<html>
<head>
  <title>Support ZeroBudget Films</title>
  <meta name="viewport" content="width=device-width, initial-scale=1">

  <style>
    body {
      font-family: sans-serif;
      background: #111;
      color: white;
      text-align: center;
      padding: 40px;
    }

    .button {
      display: block;
      margin: 15px auto;
      padding: 15px;
      width: 260px;
      background: white;
      color: black;
      text-decoration: none;
      border-radius: 12px;
      font-size: 16px;
    }

    .note {
      margin-top: 20px;
      line-height: 1.6;
      color: #ccc;
    }
  </style>
</head>

<body>

  <h1>Support ZeroBudget Films</h1>

  <p>
    Your contribution helps us make more films and pay artists and technicians fairly.
  </p>

  <div class="note">
    <strong>UPI ID copied successfully.</strong><br>
    Paste it in your preferred UPI app to pay.
  </div>

  <a class="button"
     href="upi://pay?pa=arvin.vaz@federal&pn=Arvin%20Vaz">
    Open Any UPI App
  </a>

  <a class="button"
     href="https://pay.google.com/">
    Open Google Pay
  </a>

  <a class="button"
     href="https://www.phonepe.com/">
    Open PhonePe
  </a>

  <a class="button"
     href="https://paytm.com/">
    Open Paytm
  </a>

  <script>
    navigator.clipboard.writeText("arvin.vaz@federal");
  </script>

</body>
</html>
